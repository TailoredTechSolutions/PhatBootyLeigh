<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Leigh · Empire Dashboard</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="dashboard/reactbits.css">
<link rel="stylesheet" href="dashboard/domegallery.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scrollbar-gutter: stable; }
  body {
    background: var(--bg-app);
    color: var(--text-heading);
    font-family: var(--font-body);
    font-size: var(--fs-body);
    line-height: var(--lh-body);
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  ::selection { background: rgba(212,175,55,0.25); }
  /* dark scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--ob-950); }
  ::-webkit-scrollbar-thumb { background: var(--ob-600); border-radius: 6px; border: 2px solid var(--ob-950); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ob-500); }
  button { font-family: var(--font-body); }
  @keyframes hlSlideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  input[type="range"] { height: 4px; border-radius: 3px; background: var(--ob-700); -webkit-appearance: none; appearance: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--gd-400); cursor: pointer; box-shadow: 0 0 8px rgba(212,175,55,0.4); }
  input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; border: none; border-radius: 50%; background: var(--gd-400); cursor: pointer; }
</style>
</head>
<body style="font-size: 20px; font-family: Verdana; background-color: rgb(29, 28, 1)">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="dashboard/data.js"></script>
<script type="module">
  // ogl (WebGL) for Lightfall — standalone, no React dependency
  import * as ogl from 'https://cdn.jsdelivr.net/npm/ogl@1.0.11/+esm';
  window.ogl = ogl;
  window.dispatchEvent(new Event('ogl-ready'));
</script>
<script type="text/babel" src="dashboard/ui.jsx"></script>
<script type="text/babel" src="dashboard/lightfall.jsx"></script>
<script type="text/babel" src="dashboard/borderglow.jsx"></script>
<script type="text/babel" src="dashboard/domegallery.jsx"></script>
<script type="text/babel" src="dashboard/host.jsx"></script>
<script type="text/babel" src="dashboard/portals.jsx"></script>
<script type="text/babel" src="dashboard/app.jsx"></script>
</body>
</html>
