<title>Host Leigh — Portfolio Walkthrough</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:    #C9A84C;
    --gold-lt: #E8C97A;
    --ivory:   #F5F0E8;
    --ink:     #0E0B07;
    --slate:   #1A1510;
    --muted:   #8A7D6A;
    --accent:  #D4A853;
    --bg:      #0A0806;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── LIGHTFALL CANVAS ── */
  #lf-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.35;
  }

  /* ── LAYOUT ── */
  #app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── HEADER ── */
  header {
    padding: 18px 0 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-monogram {
    width: 38px;
    height: 38px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ivory);
  }
  .brand-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .section-counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .section-counter span {
    color: var(--gold);
    font-weight: 500;
  }

  /* Progress bar */
  .progress-wrap {
    width: 120px;
    height: 2px;
    background: rgba(201,168,76,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-lt));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── MAIN CONTENT ── */
  main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 32px;
    align-items: start;
    padding: 28px 0;
    overflow: hidden;
  }

  /* Phone mockup side */
  .phone-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .phone-frame {
    position: relative;
    width: 260px;
    background: #1A1510;
    border-radius: 36px;
    border: 2px solid rgba(201,168,76,0.35);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.04),
      0 0 40px rgba(201,168,76,0.08);
    overflow: hidden;
    padding: 8px;
  }

  .phone-screen {
    border-radius: 28px;
    overflow: hidden;
    background: #111;
    position: relative;
    height: 480px;
  }

  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    transition: opacity 0.4s ease;
  }

  /* Section label pill */
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 16px;
  }
  .section-dot {
    width: 5px;
    height: 5px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Script / right side */
  .script-side {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: calc(100vh - 180px);
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: none;
  }
  .script-side::-webkit-scrollbar { display: none; }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    line-height: 1.2;
    color: var(--ivory);
    margin-bottom: 6px;
    transition: all 0.4s ease;
  }
  .timestamp {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .voiceover-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .voiceover-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,168,76,0.2);
  }

  .voiceover-text {
    font-size: 14px;
    line-height: 1.75;
    color: rgba(245,240,232,0.82);
    font-weight: 300;
    margin-bottom: 24px;
    font-style: italic;
  }

  .callouts-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .callouts-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .callout-item {
    display: grid;
    grid-template-columns: 16px 1fr;
    gap: 10px;
    align-items: start;
    font-size: 13px;
    color: rgba(245,240,232,0.7);
    line-height: 1.5;
  }
  .callout-arrow {
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    margin-top: 1px;
  }

  .transition-block {
    border-top: 1px solid rgba(201,168,76,0.15);
    padding-top: 14px;
  }
  .transition-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .transition-text {
    font-size: 13px;
    color: rgba(201,168,76,0.7);
    font-style: italic;
    line-height: 1.5;
  }

  /* ── NAVIGATION FOOTER ── */
  footer {
    padding: 14px 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(201,168,76,0.12);
  }

  .nav-btn {
    background: none;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--ivory);
    padding: 10px 22px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn:hover:not(:disabled) {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
    color: var(--gold-lt);
    box-shadow: 0 0 16px rgba(201,168,76,0.15);
  }
  .nav-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
  }

  .section-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(201,168,76,0.25);
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
  }
  .nav-dot.active {
    background: var(--gold);
    box-shadow: 0 0 8px rgba(201,168,76,0.5);
    width: 20px;
    border-radius: 3px;
  }
  .nav-dot:hover:not(.active) {
    background: rgba(201,168,76,0.5);
  }

  /* ── SLIDE TRANSITION ── */
  .slide-enter { opacity: 0; transform: translateY(8px); }
  .slide-visible { opacity: 1; transform: translateY(0); transition: opacity 0.35s ease, transform 0.35s ease; }
  .slide-exit { opacity: 0; transform: translateY(-8px); transition: opacity 0.2s ease, transform 0.2s ease; }

  /* ── KEYBOARD HINT ── */
  .kbd-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(138,125,106,0.5);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .kbd {
    display: inline-block;
    border: 1px solid rgba(138,125,106,0.3);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    color: rgba(138,125,106,0.5);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 780px) {
    main { grid-template-columns: 1fr; gap: 20px; }
    .phone-frame { width: 220px; }
    .phone-screen { height: 400px; }
    .section-title { font-size: 20px; }
    header { padding: 12px 0 10px; }
    .kbd-hint { display: none; }
  }
</style>
</head>

function renderSlide(idx, direction) {
  const s = slides[idx];
  const img = document.getElementById('slide-img');
  const content = document.getElementById('slide-content');
  const prog = document.getElementById('prog-bar');
  const curNum = document.getElementById('cur-num');
  const label = document.getElementById('label-text');

  // Update image
  img.style.opacity = '0';
  setTimeout(() => {
    img.src = IMAGES[s.img];
    img.style.opacity = '1';
    img.style.transition = 'opacity 0.4s ease';
  }, 150);

  // Update header
  curNum.textContent = idx + 1;
  label.textContent = s.label;
  prog.style.width = ((idx + 1) / slides.length * 100) + '%';

  // Build content HTML
  const calloutsHTML = s.callouts.map(([key, val]) => `
    <div class="callout-item">
      <span class="callout-arrow">→</span>
      <span><strong style="color:rgba(245,240,232,0.9)">${key}</strong> — ${val}</span>
    </div>
  `).join('');

  // Transition animation
  content.className = 'slide-exit';
  setTimeout(() => {
    content.innerHTML = `
      <div class="section-title">${s.title}</div>
      <div class="timestamp">${s.timestamp}</div>
      <div class="voiceover-label">Voiceover</div>
      <p class="voiceover-text">${s.voiceover}</p>
      <div class="callouts-label">Key Callouts</div>
      <div class="callouts-list">${calloutsHTML}</div>
      <div class="transition-block">
        <div class="transition-label">Transition</div>
        <div class="transition-text">${s.transition}</div>
      </div>
    `;
    content.className = 'slide-enter';
    document.getElementById('script-side').scrollTop = 0;
    requestAnimationFrame(() => {
      content.className = 'slide-visible';
    });
  }, 200);

  // Update dots
  document.querySelectorAll('.nav-dot').forEach((d, i) => {
    d.className = 'nav-dot' + (i === idx ? ' active' : '');
  });

  // Update buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === slides.length - 1;

  // Update next button text on last slide
  const nxtBtn = document.getElementById('btn-next');
  nxtBtn.innerHTML = idx === slides.length - 1 ? '✦ Done' : 'Next →';
}

function navigate(dir) {
  if (animating) return;
  const next = current + dir;
  if (next < 0 || next >= slides.length) return;
  animating = true;
  current = next;
  renderSlide(current, dir);
  setTimeout(() => { animating = false; }, 400);
}

// ─── BUILD DOTS ───────────────────────────────────────────────────────────────
function buildDots() {
  const wrap = document.getElementById('dots');
  document.getElementById('tot-num').textContent = slides.length;
  slides.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-dot' + (i === 0 ? ' active' : '');
    btn.onclick = () => { if (!animating && i !== current) { animating = true; current = i; renderSlide(i, 0); setTimeout(() => { animating = false; }, 400); } };
    wrap.appendChild(btn);
  });
}

// ─── KEYBOARD NAV ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

// ─── LIGHTFALL WEBGL ──────────────────────────────────────────────────────────
(function initLightfall() {
  const canvas = document.getElementById('lf-canvas');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  // Vertex shader
  const vsrc = `
    attribute vec2 a_pos;
    void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
  `;

  // Fragment shader — gold/amber streaks on dark for Host Leigh palette
  const fsrc = `
    precision highp float;
    uniform vec2 iResolution;
    uniform float iTime;
    uniform vec2 iMouse;

    vec3 tanhv(vec3 x) {
      vec3 e = exp(-2.0*x);
      return (1.0-e)/(1.0+e);
    }

    // Gold palette: amber, champagne, rose gold
    vec3 palette(float h) {
      vec3 c0 = vec3(0.788, 0.659, 0.298); // gold
      vec3 c1 = vec3(0.910, 0.788, 0.478); // champagne
      vec3 c2 = vec3(0.827, 0.565, 0.341); // amber
      float t = fract(h * 2.0);
      if (h < 0.5) return mix(c0, c1, t);
      return mix(c1, c2, t);
    }

    vec2 scene(vec2 frag, vec2 r) {
      vec2 P = (frag+frag-r)/r.x;
      float z = 0.0, d = 1e3;
      vec4 O = vec4(0.0);
      for (int k = 0; k < 35; k++) {
        if (d <= 1e-4) break;
        O = z * normalize(vec4(P, 3.0, 0.0)) - vec4(0.0,4.0,1.0,0.0)/4.5;
        d = 1.0 - sqrt(dot(O,O));
        z += d;
      }
      return vec2(O.x, atan(O.z, O.y));
    }

    void main() {
      vec2 r = iResolution;
      vec2 uv0 = (gl_FragCoord.xy * 2.0 - r) / r.x;
      float T = 0.1 * iTime * 0.4 + 9.0;
      float angRings = 6.0;
      vec2 Y = vec2(5e-3, 6.28318/angRings);

      vec2 C = scene(gl_FragCoord.xy, r);
      vec2 cdx = scene(gl_FragCoord.xy + vec2(1.0,0.0), r);
      vec2 cdy = scene(gl_FragCoord.xy + vec2(0.0,1.0), r);
      vec2 dCx = cdx - C; vec2 dCy = cdy - C;
      dCx.y -= 6.28318*floor(dCx.y/6.28318+0.5);
      dCy.y -= 6.28318*floor(dCy.y/6.28318+0.5);
      vec2 fw = abs(dCx)+abs(dCy);
      C = scene(gl_FragCoord.xy, r);

      vec2 P2 = 2.0*uv0 - (r/r.x)*vec2(0.0,1.0);
      vec4 O = vec4(vec3(0.05,0.03,0.01) * 60.0 * 0.3 / (1e3*dot(P2,P2)+6.0), 0.0);

      float zr = 5e-4 * 1.0;
      vec2 rr = vec2(max(length(fw),1e-5));
      float tail = 19.0 / 0.8;

      for (int m = 0; m < 3; m++) {
        float jf = float(m)+1.0;
        float ic = fract(sin(dot(vec2(jf, floor(C.x/Y.x+0.5)), vec2(7.0,11.0))*73.0));
        vec2 Pp = C - (T + T*ic)*vec2(0.0,1.0);
        Pp -= floor(Pp/Y+0.5)*Y;
        float h = fract(8663.0*ic);
        vec3 col = palette(h);
        float weight = mix(1.5, 1.0+sin(T+7.0*h+4.0), 0.7);
        vec2 inner = vec2(length(max(Pp,vec2(-1.0,0.0))),length(Pp)-zr)-zr;
        vec2 sm = 1.0-smoothstep(-rr,rr,inner);
        O.rgb += dot(sm,vec2(exp(tail*Pp.y),3.0))*col*weight;
        C.x += Y.x/8.0;
      }

      vec3 colr = sqrt(tanhv(max(O.rgb*0.8 - vec3(0.04,0.08,0.02),0.0)));
      gl_FragColor = vec4(colr, 0.9);
    }
  `;

  function compileShader(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    return sh;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, vsrc));
  gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uRes   = gl.getUniformLocation(prog, 'iResolution');
  const uTime  = gl.getUniformLocation(prog, 'iTime');
  const uMouse = gl.getUniformLocation(prog, 'iMouse');

  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = window.innerHeight - e.clientY;
  });

  function loop(t) {
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, t * 0.001);
    gl.uniform2f(uMouse, mouseX, mouseY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildDots();
renderSlide(0, 1);
</script>
